<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Satisfaction Survey</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    width: 600px;
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    overflow: hidden;
}

.header {
    background: linear-gradient(90deg, #4b6cb7, #182848);
    padding: 25px;
    text-align: center;
    color: white;
}

.header img {
    display: block;
    margin: 0 auto 10px auto;
    height: 60px;
}

.header h2 {
    margin: 0;
    font-weight: 600;
}

.header p {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.9;
}

.form-body {
    padding: 30px;
}

label {
    font-size: 14px;
    font-weight: 500;
    margin-top: 18px;
    display: block;
    color: #333;
}

input, select, textarea {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.3s;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #4b6cb7;
    box-shadow: 0 0 0 2px rgba(75,108,183,0.15);
}

textarea {
    resize: none;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

button {
    width: 100%;
    margin-top: 30px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #4b6cb7, #182848);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <img src="university_logo.png" alt="University Logo">
        <h2>Student Satisfaction Survey</h2>
        <p>Your feedback helps us improve academic quality</p>
    </div>

    <form class="form-body" action="submit_survey.php" method="post">

        <label>Full Name</label>
        <input type="text" name="fullname" required>

        <label>Email Address</label>
        <input type="email" name="email" required>

        <div class="grid">
            <div>
                <label>Age</label>
                <input type="number" name="age">
            </div>
            <div>
                <label>Gender</label>
                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>
        </div>

        <label>City</label>
        <input type="text" name="city">

        <label>How satisfied are you with university facilities?</label>
        <textarea name="q1" rows="3"></textarea>

        <label>How is the quality of teaching?</label>
        <textarea name="q2" rows="3"></textarea>

        <label>Would you recommend this university to others?</label>
        <textarea name="q3" rows="3"></textarea>

        <button type="submit">Submit Survey</button>
    </form>
</div>

</body>
</html>
